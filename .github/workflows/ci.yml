name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  validate:
    name: Validate skills and marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest

      - name: Validate marketplace + skills
        run: python scripts/validate.py

      - name: Run unit tests on the validator
        run: pytest -q tests/

  lint-markdown:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # markdownlint-cli2 is fast and easy to silence per-rule via the config
      # in .markdownlint.jsonc. The intent of this job is to catch broken
      # links and obviously busted formatting — not to enforce stylistic taste.
      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules
